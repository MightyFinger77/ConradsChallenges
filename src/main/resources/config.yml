# Config version - do not modify
config_version: 6

# World players are sent to when using /challengecomplete or when time limit expires. (sends to world spawn)
spawn-world: world

# Party system settings
party-radius: 10  # Radius in blocks for party members to be detected (default: 10)
pending-challenge-timeout-seconds: 15  # Seconds before a pending challenge is automatically cancelled (default: 15)
solo-countdown-seconds: 20  # Countdown time in seconds before solo players are teleported to challenge (default: 10)
party-countdown-seconds: 60  # Countdown time in seconds before party members are teleported to challenge (default: 10)

# Reset MythicMobs spawner cooldowns when a challenge starts (so spawners can fire immediately).
# If you get TPS drops when challenges start, set to false; spawners will keep their natural cooldown.
reset-spawner-cooldowns-on-challenge-start: true

# Clear dropped items on the ground in the challenge/regen area when a challenge starts (and in test mode).
# Uses the same entity pass as mob clearing, so no extra TPS cost when enabled.
clear-dropped-items-on-challenge-start: true

# Spawner level updates (when setting difficulty tier on challenge start). Lower = less lag per tick, longer total time.
spawner-level-batch-size: 2          # How many spawners to update per batch (default 2; use 1 if TPS still drops)
spawner-level-ticks-between-batches: 2  # Ticks to wait between batches (default 2; increase if server is laggy)

# Difficulty tier level modifiers (adds to spawner's base mob_level)
difficulty-tiers:
  easy: 0      # No level increase
  medium: 10   # Adds 10 levels
  hard: 35     # Adds 35 levels
  extreme: 100  # Adds 100 levels

# Difficulty tier reward multipliers (multiplies rewards from previous tier)
# Each tier multiplies the rewards from the previous tier
# Example: Easy=1.0, Medium=1.5 means Medium gives 1.5x Easy rewards
#          Hard=2.0 means Hard gives 2.0x Medium rewards (3.0x Easy total)
difficulty-reward-multipliers:
  easy: 1.0      # Base multiplier (no change)
  medium: 1.5    # Medium = Easy * 1.5
  hard: 2.0      # Hard = Medium * 2.0 (3.0x Easy total)
  extreme: 3.0   # Extreme = Hard * 3.0 (9.0x Easy total)

# Lives system: Number of lives per difficulty tier
# When a player dies, they keep inventory and are teleported back to challenge destination
# When lives run out, they're removed from challenge and drop inventory
lives-per-tier:
  easy: 3        # Easy tier gets 3 lives
  medium: 2      # Medium tier gets 2 lives
  hard: 1        # Hard tier gets 1 life
  extreme: 1     # Extreme tier gets 1 life

# Buy-back fees per difficulty (cost to re-enter after running out of lives; /buyback)
buy-back-fees:
  easy: 6000.0
  medium: 6000.0
  hard: 6000.0
  extreme: 6000.0

# Item buyback: when a player runs out of lives (and did NOT die during an invasion), store their dropped items
# and let them pay a fee to get them back from the death stats GUI. If they died during an invasion, items drop
# on the floor and this option is disabled.
item-buyback-enabled: true
item-buyback-fee: 100000.0

# General debug logging (e.g. container restore/store during challenge regen)
debug: false  # When true, logs [CONTAINER DEBUG] and other debug messages

# Debug logging for spawner level management
# When enabled, logs detailed information about spawner level changes (original levels, setting levels, reverting)
# When disabled, only logs summary information (e.g., "Updated 8 spawner level(s)")
debug-spawner-levels: false  # Default: false

# Ignored chests (chests that skip loot tables and use normal regen): when false they open the real block; when true they get per-player instance contents (copy of block)
instance-ignored-chests: false  # Default: false (real block opens)

# GateKeeper NPC UUID list (set via /conradchallenges setnpc)
npcs: []

# Stuck crystal: given to challengers on entry; right-click opens confirm GUI, then TP to challenge start. Set via /cchallenges setstuck.
stuck-crystal:
  material: ""
  display-name: ""
  lore: []
  custom-model-data: null

# Anti-forgery settings (fake challenge books)
anti-forgery:
  enabled: true
  fine-amount: 50.0        # amount to charge for a fake book
  drain-if-less: true      # if player has less than fine-amount, drain entire balance
  broadcast: true          # announce to the server when detected
  required-author: ""      # books must be signed by this author name (or one of the names in the list). Leave empty to disable author check.
  # Either a single string or a YAML list of author names.
  # Examples:
  #   required-author: OfficerConradd
  #   required-author:
  #     - OfficerConradd
  #     - SomeOtherAdmin

anger:
  enabled: true
  duration-seconds: 300    # 5 minutes
  # Insults have been moved to messages.yml under anger.insults
  # Edit messages.yml to customize GateKeeper's angry responses

# Edit mode settings
edit-mode:
  # What to do when a player disconnects while in edit mode
  # Options: "cancel" (restore from backup) or "save" (keep changes)
  disconnect-action: save # Default: save

# Function tool (script editor): item given in edit mode to add scripts to blocks
function-tool:
  # Material for the tool (e.g. BLAZE_ROD, STICK, BONE, CARROT_ON_A_STICK)
  material: BLAZE_ROD
  # Display name (use & for color codes, e.g. &6 = gold). Empty = use default.
  display-name: "§6Challenge Function Tool"

# Challenge area settings
challenge-area:
  # Whether to automatically box in challenge areas with barrier blocks
  # Set challenge area using /conradchallenges challenge setchallengearea <id>
  # Use WorldEdit selection (//1 and //2) to select the area
  barrier-boxing: false  # Default: false (off)
  # When true, players in the same challenge cannot damage each other (PvP blocked between party/same-instance members)
  block-pvp-between-challenge-members: true  # Default: true (4.2.0)

# World aliases allow you to replace the world name with something different in displays.
# Use the placeholder %conradchallenges_world_alias% in scoreboards, chat, holograms, etc.
# to display the world alias for the player's current world.
# Example:
# world-aliases:
#   world: "&aSurvival"
#   world_nether: "&aSurvival"
#   world_the_end: "&aSurvival"
world-aliases: {}

# Challenge aliases allow you to replace challenge IDs with custom display names (with color codes).
# Use the placeholder %conradchallenges_challenge_alias_<id>% in scoreboards, chat, holograms, etc.
# to display the challenge alias for a specific challenge ID.
# You can also use %conradchallenges_challenge_alias_active% to get the alias for the player's current active challenge.
# Example:
# challenge-aliases:
#   dungeon1: "&6&lDungeon Challenge"
#   dungeon2: "&c&lBoss Arena"
#   parkour_easy: "&aEasy Parkour"
challenge-aliases: {}

# Invasions (Souls-like: invade ongoing challenges)
# Set invasion crystal with /invader setitem, RTP item with /invader setrtp
# EXPIREMENTAL FEATURE; USE AT YOUR OWN RISK
invasions:
  enabled: false
  # Party invasion countdown (seconds) before teleporting
  party-countdown-seconds: 10
  # Max invaders in a solo challenge (1) or party challenge (3)
  max-invaders-solo-challenge: 1
  max-invaders-party-challenge: 3
  # Radius (blocks) for /accept when joining a party invasion
  party-accept-radius: 10
  # RTP item: delay (seconds) before teleport when right-clicking
  rtp-delay-seconds: 5
  # After PvP (damage dealt or taken), RTP item blocked for this many seconds
  pvp-cooldown-seconds: 10
  # Invasion crystal (full item: material, display name, lore, custom model data). Leave blank until set via /invader setitem.
  crystal-material: ""
  crystal-display-name: ""
  crystal-lore: []
  crystal-custom-model-data: null
  # RTP item given to invaders (full item). Leave blank until set via /invader setrtp.
  rtp-material: ""
  rtp-display-name: ""
  rtp-lore: []
  rtp-custom-model-data: null
  # When a new invader joins an already-invaded challenge: "subtitle", "actionbar", or "none"
  new-invader-join-message: "subtitle"
  # Bloodcaller NPC UUIDs (set with /invader setnpc, remove with /invader removenpc). Use crystal on Bloodcaller to invade.
  bloodcaller-npcs: []
  # Seconds invaders stay in the challenge to loot after killing all challengers, then are teleported back and must redeem at Bloodcaller
  victory-loot-seconds: 120

# Challenges are stored in challenges.yml (created via /conradchallenges challenge create <id>)

